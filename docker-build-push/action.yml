name: Docker Build & Push
description: Build and push Docker image to GHCR

inputs:
  image-name:
    description: Image name (e.g. owner/repo)
    required: true
  github-token:
    description: GitHub token for GHCR login
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ inputs.image-name }}:latest
          ghcr.io/${{ inputs.image-name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
