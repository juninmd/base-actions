name: Reusable Security Scan

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false

jobs:
  scan:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: juninmd/base-actions/security-scan@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
