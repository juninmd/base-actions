name: Validate PR
description: >
  Universal PR validation: secrets check + build/lint/test
  for Node.js (package.json) or Python (pyproject.toml) projects.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '22'
  python-version:
    description: Python version
    required: false
    default: '3.13'
  pnpm-version:
    description: pnpm version
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Check for committed secrets (Basic)
      shell: bash
      run: |
        forbidden=$(git ls-files | grep -E '(^|\/)\.env$|(^|\/)\.env\.(local|production|prod|staging|dev)$|(^|\/)id_rsa$|(^|\/).+\.pem$|(^|\/).+\.key$' || true)
        if [ -n "$forbidden" ]; then
          echo "::error::Secret files tracked: $forbidden"
          exit 1
        fi
        echo "No committed secrets found."

    - name: Gitleaks Scan (Incremental)
      uses: gitleaks/gitleaks-action@v3
      env:
        GITHUB_TOKEN: ${{ github.token }}

    # ─── Version Detection ─────────────────────────────
    - name: Detect Runtime Versions
      shell: bash
      run: |
        NODE_VER="${{ inputs.node-version }}"
        PYTHON_VER="${{ inputs.python-version }}"
        if [ -f ".nvmrc" ]; then
          NODE_VER=$(cat .nvmrc | tr -d 'v \n\r')
        elif [ -f ".node-version" ]; then
          NODE_VER=$(cat .node-version | tr -d 'v \n\r')
        elif [ -f "package.json" ]; then
          if grep -q -E '"typescript":\s*"~2\.' package.json || grep -q -E '"@angular/core":\s*"4\.' package.json || grep -q -E '"@ionic/app-scripts"' package.json; then
            NODE_VER="10"
          fi
        fi
        if [ -f ".python-version" ]; then
          PYTHON_VER=$(cat .python-version | tr -d ' \n\r')
        elif [ -f "requirements.txt" ] && grep -i -E "realtimetts|realtimestt|realtime-tts|coqui" requirements.txt >/dev/null; then
          PYTHON_VER="3.11"
        fi
        echo "NODE_VERSION_DETECTED=$NODE_VER" >> $GITHUB_ENV
        echo "PYTHON_VERSION_DETECTED=$PYTHON_VER" >> $GITHUB_ENV
        echo "::notice::Detected Node.js version: $NODE_VER"
        echo "::notice::Detected Python version: $PYTHON_VER"

    # ─── Node.js ──────────────────────────────────────
    - name: Setup Node.js
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION_DETECTED }}

    - name: Check packageManager field
      id: check-pm
      if: hashFiles('pnpm-lock.yaml') != ''
      shell: bash
      run: |
        if grep -q '"packageManager"' package.json 2>/dev/null; then
          echo "has-package-manager=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-package-manager=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup pnpm (legacy, via action)
      if: hashFiles('pnpm-lock.yaml') != '' && steps.check-pm.outputs.has-package-manager != 'true'
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    # Quando o package.json tem "packageManager", o pnpm/action-setup é pulado
    # (para evitar conflito de versão). Nesse caso o pnpm vem do corepack, que
    # precisa ser habilitado explicitamente — senão `pnpm` não existe (exit 127).
    - name: Enable corepack (packageManager field)
      if: hashFiles('pnpm-lock.yaml') != '' && steps.check-pm.outputs.has-package-manager == 'true'
      shell: bash
      run: corepack enable

    - name: Install Node dependencies
      if: hashFiles('package.json') != ''
      shell: bash
      run: |
        NODE_MAJOR=$(node -v | cut -d'.' -f1 | tr -d 'v' || echo "22")
        if [ "$NODE_MAJOR" -ge 17 ] 2>/dev/null; then
          export NODE_OPTIONS="--openssl-legacy-provider"
        fi
        if [ -f "pnpm-lock.yaml" ]; then
          pnpm install --frozen-lockfile
        elif [ -f "yarn.lock" ]; then
          yarn install --frozen-lockfile || yarn install
        elif [ -f "package-lock.json" ]; then
          npm ci --legacy-peer-deps || npm ci
        else
          npm install --legacy-peer-deps || npm install
        fi

    - name: Build Node
      if: hashFiles('package.json') != ''
      shell: bash
      run: |
        NODE_MAJOR=$(node -v | cut -d'.' -f1 | tr -d 'v' || echo "22")
        if [ "$NODE_MAJOR" -ge 17 ] 2>/dev/null; then
          export NODE_OPTIONS="--openssl-legacy-provider"
        fi
        if [ -f "pnpm-lock.yaml" ]; then
          pnpm run build --if-present
        else
          npm run build --if-present
        fi

    - name: Lint Node
      if: hashFiles('package.json') != ''
      shell: bash
      run: |
        NODE_MAJOR=$(node -v | cut -d'.' -f1 | tr -d 'v' || echo "22")
        if [ "$NODE_MAJOR" -ge 17 ] 2>/dev/null; then
          export NODE_OPTIONS="--openssl-legacy-provider"
        fi
        if [ -f "pnpm-lock.yaml" ]; then
          pnpm run lint --if-present
        else
          npm run lint --if-present
        fi

    - name: Test Node
      if: hashFiles('package.json') != ''
      shell: bash
      run: |
        NODE_MAJOR=$(node -v | cut -d'.' -f1 | tr -d 'v' || echo "22")
        if [ "$NODE_MAJOR" -ge 17 ] 2>/dev/null; then
          export NODE_OPTIONS="--openssl-legacy-provider"
        fi
        if [ -f "pnpm-lock.yaml" ]; then
          pnpm test --if-present
        else
          npm test --if-present
        fi

    # ─── Python ───────────────────────────────────────
    - name: Setup uv
      if: hashFiles('pyproject.toml') != '' || hashFiles('uv.lock') != ''
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ env.PYTHON_VERSION_DETECTED }}

    - name: Setup Python
      if: (hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '') && hashFiles('uv.lock') == ''
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION_DETECTED }}

    - name: Install Python dependencies
      if: hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != ''
      shell: bash
      run: |
        if [ -f "uv.lock" ]; then
          uv sync
        elif [ -f "pyproject.toml" ]; then
          pip install .[dev,test] 2>/dev/null || pip install .[dev] 2>/dev/null || pip install .
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi

    - name: Lint Python
      if: hashFiles('pyproject.toml') != '' || hashFiles('uv.lock') != ''
      shell: bash
      run: |
        if [ -f "uv.lock" ]; then
          uv run ruff check . --exit-zero 2>/dev/null || echo "No ruff config found"
        else
          pip install ruff 2>/dev/null || true
          ruff check . --exit-zero 2>/dev/null || echo "No ruff config found"
        fi

    - name: Test Python
      if: hashFiles('pyproject.toml') != '' || hashFiles('uv.lock') != ''
      shell: bash
      run: |
        if [ -f "uv.lock" ]; then
          uv run pytest -x --timeout=30 2>/dev/null || echo "No tests found"
        else
          pip install pytest pytest-asyncio 2>/dev/null || true
          python -m pytest -x --timeout=30 2>/dev/null || echo "No tests found"
        fi

    # ─── Helm / K8s ───────────────────────────────────
    - name: Install Helm
      if: hashFiles('**/Chart.yaml') != ''
      uses: azure/setup-helm@v5

    - name: Lint Helm Charts
      if: hashFiles('**/Chart.yaml') != ''
      shell: bash
      run: |
        find . -name "Chart.yaml" -exec dirname {} \; | while read chart; do
          echo "Linting chart: $chart"
          helm lint "$chart"
          helm template "$chart" > /dev/null
        done
