name: 'Setup PNPM & Node'
description: 'Instala Node, PNPM e configura cache de dependências'

inputs:
  node-version:
    description: 'Versão do Node.js'
    required: false
    default: '22'
  pnpm-version:
    description: 'Versão do PNPM'
    required: false
    default: 'latest'
  install-deps:
    description: 'Se deve rodar pnpm install'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    # Se o package.json tem "packageManager", o pnpm/action-setup conflita
    # ("Multiple versions of pnpm specified"); nesse caso o pnpm vem do corepack.
    - name: Detect packageManager field
      id: pm
      shell: bash
      run: |
        if grep -q '"packageManager"' package.json 2>/dev/null; then
          echo "has=true" >> "$GITHUB_OUTPUT"
        else
          echo "has=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install PNPM (action)
      if: steps.pm.outputs.has != 'true'
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Enable corepack (packageManager field)
      if: steps.pm.outputs.has == 'true'
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile || { echo "::warning::pnpm-lock.yaml desatualizado — fallback para install não-frozen"; pnpm install --no-frozen-lockfile; }
