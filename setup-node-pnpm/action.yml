name: 'Setup PNPM & Node'
description: 'Instala Node, PNPM e configura cache de dependências'

inputs:
  node-version:
    description: 'Versão do Node.js'
    required: false
    default: '22'
  pnpm-version:
    description: 'Versão do PNPM'
    required: false
    default: 'latest'
  install-deps:
    description: 'Se deve rodar pnpm install'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Install PNPM
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
